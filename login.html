<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In – ApexTrainer AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--cyan:#00f5ff;--cyan-dim:#00c4cc;--cyan-dark:#007a82;--black:#000;--dark:#050a0a;--dark2:#0a1414;--dark3:#0d1c1c;--text:#c8f0f0;--white:#fff;--glow:0 0 20px rgba(0,245,255,0.5);--glow-sm:0 0 10px rgba(0,245,255,0.4);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--dark);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:999;}
  .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px);background-size:60px 60px;}
  .bg-glow{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(ellipse,rgba(0,245,255,0.05) 0%,transparent 70%);pointer-events:none;}
  nav{position:fixed;top:0;left:0;width:100%;background:rgba(5,10,10,0.95);border-bottom:1px solid rgba(0,245,255,0.12);padding:0 5%;z-index:100;}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:65px;}
  .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.2rem;color:var(--cyan);text-shadow:var(--glow-sm);text-decoration:none;letter-spacing:2px;}
  .back-link{color:var(--text);text-decoration:none;font-size:0.9rem;font-weight:600;opacity:0.6;transition:opacity 0.3s;letter-spacing:1px;}
  .back-link:hover{opacity:1;color:var(--cyan);}
  .login-box{background:var(--dark2);border:1px solid rgba(0,245,255,0.15);padding:3rem;width:100%;max-width:440px;position:relative;z-index:1;margin-top:65px;}
  .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
  .login-title{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:700;color:var(--white);margin-bottom:0.5rem;text-align:center;}
  .login-sub{font-size:0.9rem;opacity:0.55;text-align:center;margin-bottom:2.5rem;}
  .form-group{margin-bottom:1.3rem;}
  .form-group label{display:block;font-size:0.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:0.5rem;}
  .form-group input{width:100%;background:var(--dark3);border:1px solid rgba(0,245,255,0.12);color:var(--white);padding:0.85rem 1rem;font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:border-color 0.3s;}
  .form-group input:focus{border-color:var(--cyan);box-shadow:0 0 8px rgba(0,245,255,0.1);}
  .forgot{display:block;text-align:right;font-size:0.8rem;color:var(--cyan);text-decoration:none;margin-top:-0.8rem;margin-bottom:1.5rem;opacity:0.7;}
  .forgot:hover{opacity:1;}
  .login-btn{width:100%;padding:1rem;background:var(--cyan);color:var(--black);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all 0.3s;margin-top:0.5rem;}
  .login-btn:hover{background:var(--white);box-shadow:var(--glow);}
  .login-footer{text-align:center;margin-top:1.5rem;font-size:0.9rem;opacity:0.6;}
  .login-footer a{color:var(--cyan);text-decoration:none;}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">APEX<span style="color:#fff;">TRAINER</span> AI</a>
    <a class="back-link" href="index.html">← Back to Home</a>
  </div>
</nav>
<div class="login-box">
  <div class="login-title">Welcome Back</div>
  <div class="login-sub">Sign in to continue your training journey</div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" placeholder="john@example.com">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" placeholder="Your password">
  </div>
  <a href="#" class="forgot">Forgot password?</a>
  <button class="login-btn" onclick="goToDashboard()">Sign In →</button>
  <div class="login-footer">Don't have an account? <a href="signup.html">Create one free</a></div>
</div>
<script>
function goToDashboard(){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;opacity:0;transition:opacity 0.4s;';
  document.body.appendChild(overlay);
  setTimeout(()=>overlay.style.opacity='1',10);
  setTimeout(()=>window.location.href='dashboard.html',500);
}
</script>
</body>
</html>
